server.port=${PORT:8443}
server.ssl.enabled=true
server.ssl.key-store=${KEYSTORE_PATH:classpath:keystore/ecikeystore.p12}
server.ssl.key-store-password=${KEYSTORE_PASSWORD:123456}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=${KEY_ALIAS:ecikeypair}

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:secureappdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false

# CORS — comma-separated list of allowed origins
# Set ALLOWED_ORIGIN env var in production, e.g.: https://apache.yourdomain.com
ALLOWED_ORIGIN=${ALLOWED_ORIGIN:https://localhost}