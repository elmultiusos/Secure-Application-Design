# Apache VirtualHost configuration for Secure Application Design
# Place this file in: /etc/httpd/conf.d/secureapp.conf  (Amazon Linux 2023)
# Replace "elmultiusos.duckdns.org" with your actual domain on both servers.
#
# After Let's Encrypt cert installation (see README), run:
#   sudo systemctl reload httpd

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName elmultiusos.duckdns.org
    Redirect permanent / https://elmultiusos.duckdns.org/
</VirtualHost>

# ── HTTPS — serves the HTML+JS client ─────────────────────────────────────────
<VirtualHost *:443>
    ServerName elmultiusos.duckdns.org
    DocumentRoot /var/www/html

    # TLS — certificates from Let's Encrypt (Certbot)
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/elmultiusos.duckdns.org/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/elmultiusos.duckdns.org/privkey.pem

    # Modern TLS settings
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    # Security headers
    Header always set Strict-Transport-Security "max-age=63072000"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    <Directory /var/www/html>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Logging
    ErrorLog  /var/log/httpd/secureapp_error.log
    CustomLog /var/log/httpd/secureapp_access.log combined
</VirtualHost>
